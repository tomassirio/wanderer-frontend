<!DOCTYPE html>
<html lang="">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Track your trips and adventures">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Wanderer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Wanderer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Application Configuration -->
  <script>
    window.appConfig = {
      commandBaseUrl: '{{COMMAND_BASE_URL}}',
      queryBaseUrl: '{{QUERY_BASE_URL}}',
      authBaseUrl: '{{AUTH_BASE_URL}}',
      wsBaseUrl: '{{WS_BASE_URL}}',
      googleMapsApiKey: '{{GOOGLE_MAPS_API_KEY}}'
    };

    // Signal that Google Maps should initialize
    window._googleMapsLoading = true;
  </script>
</head>
<body>
  <!-- Google Maps JavaScript API - Load before Flutter with callback -->
  <script>
    function initGoogleMaps() {
      window._googleMapsLoading = false;
      window._googleMapsLoaded = true;
      console.log('Google Maps API loaded successfully');
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key={{GOOGLE_MAPS_API_KEY}}&libraries=places,geometry&callback=initGoogleMaps"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
