apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}{{ .Values.nameSuffix }}-config
  labels:
    app: {{ .Chart.Name }}{{ .Values.nameSuffix }}
data:
  nginx.conf: |
    # DNS resolver for Kubernetes - forces nginx to re-resolve DNS on each request
    resolver 10.43.0.10 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen {{ .Values.application.port }};
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Proxy to internal backend services
        # The Flutter app uses three different base URLs (/api/command, /api/query, /api/auth)
        # which nginx proxies to the internal Kubernetes services

        # WebSocket - proxy /ws to wanderer-command service for real-time updates
        location /ws {
            set $backend_command wanderer-command{{ .Values.nameSuffix }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.commandPort }};
            proxy_pass http://$backend_command;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
        }

        # Auth Service - proxy /api/auth/* to wanderer-auth service /api/1/auth/*
        location /api/auth/ {
            set $backend_auth wanderer-auth{{ .Values.nameSuffix }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.authPort }};
            rewrite ^/api/auth/(.*)$ /api/1/auth/$1 break;
            proxy_pass http://$backend_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Admin Service - proxy /api/admin/* to wanderer-auth service /api/1/admin/*
        location /api/admin/ {
            set $backend_auth wanderer-auth{{ .Values.nameSuffix }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.authPort }};
            rewrite ^/api/admin/(.*)$ /api/1/admin/$1 break;
            proxy_pass http://$backend_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Command Service - proxy /api/command/* to wanderer-command service /api/1/*
        location /api/command/ {
            set $backend_command wanderer-command{{ .Values.nameSuffix }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.commandPort }};
            rewrite ^/api/command/(.*)$ /api/1/$1 break;
            proxy_pass http://$backend_command;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Query Service - proxy /api/query/* to wanderer-query service /api/1/*
        location /api/query/ {
            set $backend_query wanderer-query{{ .Values.nameSuffix }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.queryPort }};
            rewrite ^/api/query/(.*)$ /api/1/$1 break;
            proxy_pass http://$backend_query;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Thumbnails - proxy /thumbnails/* to nginx static file server
        # Strip /thumbnails prefix and proxy to command nginx
        # Nginx serves from /usr/share/nginx/html/ which is mounted to /data/thumbnails/
        # So /thumbnails/trips/UUID.png -> /trips/UUID.png -> /usr/share/nginx/html/trips/UUID.png
        location ^~ /thumbnails/ {
            set $backend_nginx wanderer-command{{ .Values.nameSuffix }}-nginx.{{ .Release.Namespace }}.svc.cluster.local;
            rewrite ^/thumbnails/(.*)$ /$1 break;
            proxy_pass http://$backend_nginx;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            # Allow caching
            proxy_cache_valid 200 30d;
        }

        # Handle Flutter web routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache index.html and main.dart.js to ensure updates are picked up
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~* main\.dart\.js$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
