name: Merge to Master

on:
  push:
    branches:
      - master

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    # Skip if commit was made by CI (prevents infinite loop)
    if: >-
      !startsWith(github.event.head_commit.message, 'ci: ')
    outputs:
      release-version: ${{ steps.set-release-version.outputs.version }}
      base-version: ${{ steps.set-release-version.outputs.base-version }}
      skip: ${{ steps.set-release-version.outputs.skip }}
    permissions:
      contents: write
    steps:
      - name: Debug push event
        run: |
          echo "Head commit message: ${{ github.event.head_commit.message }}"
          echo "Head commit author: ${{ github.event.head_commit.author.email }}"
          echo "Actor: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Set release version
        id: set-release-version
        run: |
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          BASE_VERSION=$(echo "$CURRENT_VERSION" | sed 's/-SNAPSHOT//' | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$CURRENT_VERSION" | grep -oP '\+\K[0-9]+' || echo "1")
          RELEASE_VERSION="${BASE_VERSION}+${BUILD_NUMBER}"
          
          echo "📋 Current version in pubspec.yaml: ${CURRENT_VERSION}"
          echo "📋 Base version: ${BASE_VERSION}"
          echo "📋 Release version: ${RELEASE_VERSION}"
          
          # Check if tag already exists - skip release if so
          if git rev-parse "v${BASE_VERSION}" >/dev/null 2>&1; then
            echo "⚠️ Tag v${BASE_VERSION} already exists, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "base-version=${BASE_VERSION}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ Tag v${BASE_VERSION} does not exist, proceeding with release"
          
          sed -i "s/^version: .*/version: ${RELEASE_VERSION}/" pubspec.yaml
          
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV
          echo "version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "base-version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Commit release version
        if: steps.set-release-version.outputs.skip != 'true'
        run: |
          if ! git diff --quiet pubspec.yaml; then
            git add pubspec.yaml
            git commit -m "ci: Release version ${RELEASE_VERSION}"
          else
            echo "No version changes to commit"
          fi

      - name: Create Git tag
        if: steps.set-release-version.outputs.skip != 'true'
        run: |
          BASE_VERSION="${{ steps.set-release-version.outputs.base-version }}"
          git tag -a "v${BASE_VERSION}" -m "Release version ${RELEASE_VERSION}"

      - name: Push changes and tags
        if: steps.set-release-version.outputs.skip != 'true'
        run: |
          REMOTE_URL="https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git"
          git push "${REMOTE_URL}" master || echo "⚠️ Could not push release commit to master (branch protection). Tag will still be created."
          git push "${REMOTE_URL}" --tags

  test-and-coverage:
    needs: prepare-release
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.extract-coverage.outputs.coverage }}
      coverage-color: ${{ steps.extract-coverage.outputs.coverage-color }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.base-version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Run tests with coverage
        run: make test

      - name: Extract coverage
        id: extract-coverage
        run: |
          if [ -f "coverage/lcov.info" ]; then
            sudo apt-get update && sudo apt-get install -y lcov
            COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP 'lines......: \K[0-9.]+' | head -1 || echo "0")
            COVERAGE=$(printf "%.0f" "$COVERAGE")
            
            if [ "$COVERAGE" -ge 80 ]; then COVERAGE_COLOR="brightgreen"
            elif [ "$COVERAGE" -ge 60 ]; then COVERAGE_COLOR="yellow"
            elif [ "$COVERAGE" -ge 40 ]; then COVERAGE_COLOR="orange"
            else COVERAGE_COLOR="red"; fi
          else
            COVERAGE="N/A"
            COVERAGE_COLOR="lightgrey"
          fi

          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          echo "coverage-color=${COVERAGE_COLOR}" >> $GITHUB_OUTPUT

  build-web-app:
    needs: prepare-release
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.base-version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Build web application
        run: make build

      - name: Create release archive
        run: tar -czf wanderer-frontend-web.tar.gz -C build/web .

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: wanderer-frontend-web.tar.gz
          retention-days: 1

  build-apk:
    needs:
      - prepare-release
      - create-release
      - finalize-release
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.base-version }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Inject Google Maps API key for Android
        run: echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" > .env

      - name: Set up keystore for signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=${{ github.workspace }}/android/app/upload-keystore.jks" >> android/key.properties

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=COMMAND_BASE_URL=https://${{ vars.PUBLIC_URL }}/api/command \
            --dart-define=QUERY_BASE_URL=https://${{ vars.PUBLIC_URL }}/api/query \
            --dart-define=AUTH_BASE_URL=https://${{ vars.PUBLIC_URL }}/api/auth \
            --dart-define=WS_BASE_URL=wss://${{ vars.PUBLIC_URL }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.base-version }}"
          APK_NAME="wanderer-frontend-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "${APK_NAME}"
          gh release upload "v${VERSION}" "${APK_NAME}" --clobber
          echo "✅ Uploaded ${APK_NAME} to release v${VERSION}"

  purge-cloudflare-cache:
    needs:
      - prepare-release
      - deploy-to-production
      - finalize-release
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Purge Cloudflare cache
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📋 Response (HTTP ${HTTP_CODE}):"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Cache purge failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
          
          SUCCESS=$(echo "$BODY" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Cache purge returned success=false"
            exit 1
          fi
          
          echo "✅ Cloudflare cache purged successfully"

  create-release:
    needs:
      - prepare-release
      - test-and-coverage
      - build-web-app
    if: needs.prepare-release.outputs.skip != 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release-notes.yml
    with:
      release-version: ${{ needs.prepare-release.outputs.base-version }}
      checkout-ref: v${{ needs.prepare-release.outputs.base-version }}
      artifact-names: web-build


  build-release-docker-images:
    needs: prepare-release
    if: needs.prepare-release.outputs.skip != 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build.yml
    with:
      push-to-registry: true
      image-tag: v${{ needs.prepare-release.outputs.base-version }}
      checkout-ref: v${{ needs.prepare-release.outputs.base-version }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-production:
    needs:
      - prepare-release
      - build-release-docker-images
      - test-and-coverage
    if: needs.prepare-release.outputs.skip != 'true'
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: prod
      image-tag: v${{ needs.prepare-release.outputs.base-version }}
      namespace: wanderer
    secrets:
      TWINGATE_SERVICE_KEY: ${{ secrets.TWINGATE_SERVICE_KEY }}
      KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_CONTENT }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

  finalize-release:
    needs:
      - prepare-release
      - create-release
      - test-and-coverage
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Pull latest master
        run: git pull origin master --rebase

      - name: Update README badges and bump version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_VERSION="${{ needs.prepare-release.outputs.base-version }}"
          COVERAGE="${{ needs.test-and-coverage.outputs.coverage }}"
          COVERAGE_COLOR="${{ needs.test-and-coverage.outputs.coverage-color }}"

          # Update README badges
          if [ -f "README.md" ] && [ -n "$COVERAGE" ]; then
            sed -i "s/version-[0-9.]*-blue/version-${BASE_VERSION}-blue/" README.md
            sed -i "s|coverage-[^)]*|coverage-${COVERAGE}%25-${COVERAGE_COLOR}|" README.md
          fi

          # Bump to next development version
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          sed -i "s/^version: .*/version: ${NEXT_VERSION}/" pubspec.yaml

          # Create a branch, push, open a PR, and auto-merge
          BRANCH="ci/finalize-release-v${BASE_VERSION}"
          git checkout -b "$BRANCH"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "ci: Finalize release v${BASE_VERSION} — badges + next dev version (${NEXT_VERSION})"
            git push origin "$BRANCH"
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "ci: Finalize release v${BASE_VERSION}" \
              --body "Automated post-release update: badges + next dev version (${NEXT_VERSION})"
            gh pr merge "$BRANCH" --merge --auto || gh pr merge "$BRANCH" --merge
          else
            echo "Nothing to commit"
          fi

  # Handles the case where the release was skipped (tag already exists)
  # but the version in pubspec.yaml was never bumped after the last release.
  bump-skipped-version:
    needs: prepare-release
    if: needs.prepare-release.outputs.skip == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Bump version if still on released version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_VERSION="${{ needs.prepare-release.outputs.base-version }}"
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')

          # Split version and compute next SNAPSHOT
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"

          # Only bump if current version still points to the released version
          if echo "$CURRENT_VERSION" | grep -q "^${BASE_VERSION}"; then
            echo "📋 Current version ${CURRENT_VERSION} still matches released ${BASE_VERSION}, bumping to ${NEXT_VERSION}"
            sed -i "s/^version: .*/version: ${NEXT_VERSION}/" pubspec.yaml

            BRANCH="ci/bump-version-${NEXT_VERSION}"
            git checkout -b "$BRANCH"
            git add pubspec.yaml
            git commit -m "ci: Prepare for next development iteration (${NEXT_VERSION})"
            git push origin "$BRANCH"
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "ci: Prepare for next development iteration (${NEXT_VERSION})" \
              --body "Automated version bump — tag v${BASE_VERSION} already exists but version was not incremented."
            gh pr merge "$BRANCH" --merge --auto || gh pr merge "$BRANCH" --merge
          else
            echo "✅ Version ${CURRENT_VERSION} already differs from ${BASE_VERSION}, no bump needed"
          fi
