name: Helm Deploy to Kubernetes

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev, staging, prod)'
        required: true
        type: string
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace'
        required: false
        type: string
        default: 'wanderer'
    secrets:
      TWINGATE_SERVICE_KEY:
        description: 'Twingate service key for cluster access'
        required: true
      KUBECONFIG_CONTENT:
        description: 'Base64 encoded kubeconfig file'
        required: true
      GOOGLE_MAPS_API_KEY:
        description: 'Google Maps API Key'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Setup Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          
          # Skip TLS verification for self-signed certificates
          CLUSTER_NAME=$(kubectl config view -o jsonpath='{.clusters[0].name}')
          kubectl config set-cluster "$CLUSTER_NAME" --insecure-skip-tls-verify=true
          
          kubectl cluster-info
          kubectl get nodes
          echo "✓ Connected to Kubernetes cluster"

      - name: Extract app version from pubspec
        id: version
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          APP_VERSION=$(echo "$PUBSPEC_VERSION" | sed 's/-SNAPSHOT//' | sed 's/+.*//')
          echo "app-version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "📋 App version from pubspec: ${APP_VERSION}"

      - name: Update Chart.yaml version and appVersion
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.app-version }}/" chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ steps.version.outputs.app-version }}\"/" chart/Chart.yaml
          echo "✅ Updated Chart.yaml version and appVersion to ${{ steps.version.outputs.app-version }}"
          cat chart/Chart.yaml

      - name: Set environment variables
        id: config
        run: |
          # Shared configuration
          echo "command-url=/api/command" >> $GITHUB_OUTPUT
          echo "query-url=/api/query" >> $GITHUB_OUTPUT
          echo "auth-url=/api/auth" >> $GITHUB_OUTPUT
          
          # Environment-specific configuration
          if [ "${{ inputs.environment }}" == "dev" ]; then
            echo "name-suffix=-dev" >> $GITHUB_OUTPUT
            echo "service-port=41538" >> $GITHUB_OUTPUT
          else
            echo "name-suffix=" >> $GITHUB_OUTPUT
            echo "service-port=51538" >> $GITHUB_OUTPUT
          fi
          
          # Use PUBLIC_URL from environment variable, fallback to localhost
          PUBLIC_URL="${{ vars.PUBLIC_URL }}"
          if [ -z "$PUBLIC_URL" ]; then
            echo "⚠️  Warning: PUBLIC_URL not set, using default"
            PUBLIC_URL="wanderer.localwanderer.com"
          fi
          echo "ingress-host=$PUBLIC_URL" >> $GITHUB_OUTPUT
          echo "🌐 Using PUBLIC_URL: $PUBLIC_URL"

      - name: Deploy with Helm
        run: |
          helm upgrade --install wanderer-frontend ./chart \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            --set nameSuffix="${{ steps.config.outputs.name-suffix }}" \
            --set service.port=${{ steps.config.outputs.service-port }} \
            --set image.tag="${{ inputs.image-tag }}" \
            --set image.pullPolicy="Always" \
            --set application.googleMapsApiKey="${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            --set application.commandBaseUrl="${{ steps.config.outputs.command-url }}" \
            --set application.queryBaseUrl="${{ steps.config.outputs.query-url }}" \
            --set application.authBaseUrl="${{ steps.config.outputs.auth-url }}" \
            --set ingress.hosts[0].host="${{ steps.config.outputs.ingress-host }}" \
            --set ingress.hosts[0].paths[0].path="/" \
            --set ingress.hosts[0].paths[0].pathType="Prefix" \
            --wait --timeout 5m
          
          echo "✓ Deployment successful"
          echo "Access at: http://${{ steps.config.outputs.ingress-host }}"

      - name: Verify deployment
        run: |
          APP_LABEL="wanderer-frontend${{ steps.config.outputs.name-suffix }}"
          
          echo "=== Deployment Status ==="
          kubectl get statefulset,pod,service,ingress -n ${{ inputs.namespace }} -l app=$APP_LABEL
          
          kubectl wait --for=condition=ready pod -l app=$APP_LABEL \
            -n ${{ inputs.namespace }} --timeout=120s

      - name: Show logs on failure
        if: failure()
        run: |
          APP_LABEL="wanderer-frontend${{ steps.config.outputs.name-suffix }}"
          kubectl logs -l app=$APP_LABEL -n ${{ inputs.namespace }} --tail=100 || true

